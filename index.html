<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SMAN 71 Jakarta</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        nav {
            margin: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background-color: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #content {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1 style="color:red;">Cara Membuat Pempek</h1>

    <!-- Tombol Navigasi -->
    <nav>
        <button onclick="showContent('home')">Home</button>
        <button onclick="showContent('design')">Design</button>
        <button onclick="showContent('about')">About</button>
    </nav>

    <!-- Tempat Konten -->
    <div id="content">
        <p>Klik tombol di atas untuk melihat isi.</p>
    </div>

    <!-- JavaScript -->
    <script>
        function showContent(menu) {
            let text = "";

            if (menu === "home") {
                text = `
                    <p>
                    SMAN 71 Jakarta adalah salah satu sekolah menengah atas negeri 
                    yang cukup dikenal di wilayah Jakarta Timur.
                    </p>
                `;
            } 
            else if (menu === "design") {
                text = `
                    <p>
                    Di sini, siswa biasanya terlibat dalam berbagai ekstrakurikuler, 
                    seperti olahraga dan seni.
                    </p>
                `;
            } 
            else if (menu === "about") {
                text = `
                    <p>Pengenalan kelompok kami:</p>

                    <iframe 
                        src="https://canva.link/8hyzfspodb67crg"
                        width="100%" 
                        height="500" 
                        style="border:none;">
                    </iframe>
                `;
            }

            document.getElementById("content").innerHTML = text;
        }
    </script>

</body>
</html>

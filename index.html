<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Proyek Saya</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #1e3c72, #2a5298);
            color: #333;
        }

        h1 {
            text-align: center;
            color: white;
            padding: 20px;
        }

        nav {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            background-color: white;
            color: #2a5298;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2a5298;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        .card h2 {
            color: #2a5298;
        }

        .team {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .member {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
        }

        iframe {
            border-radius: 10px;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(10px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

    <h1>Judul Proyek Kamu</h1>

    <!-- NAV -->
    <nav>
        <button onclick="showContent('home')">Home</button>
        <button onclick="showContent('design')">Design</button>
        <button onclick="showContent('about')">About</button>
    </nav>

    <!-- CONTENT -->
    <div class="container" id="content">

        <div class="card">
            <h2>Deskripsi Proyek</h2>
            <p>
                <!-- ISI DI SINI -->
                Tuliskan deskripsi singkat tentang proyek kamu di sini.
            </p>
        </div>

    </div>

    <script>
        function showContent(menu) {

            let content = "";

            if (menu === "home") {
                content = `
                <div class="card">
                    <h2>Deskripsi Proyek</h2>
                    <p>
                        <!-- GANTI INI -->
                        Jelaskan tujuan proyek kamu, latar belakang, atau ide utama di sini.
                    </p>
                </div>
                `;
            }

            else if (menu === "design") {
                content = `
                <div class="card">
                    <h2>Konsep & Desain</h2>
                    <p>
                        <!-- GANTI INI -->
                        Jelaskan bagaimana desain proyek kamu dibuat, warna yang digunakan, 
                        serta alasan pemilihan tampilan.
                    </p>
                </div>
                `;
            }

            else if (menu === "about") {
                content = `
                <div class="card">
                    <h2>👥 Tim Pengembang</h2>

                    <div class="team">
                        <div class="member">
                            <b>Nama 1</b><br>
                            Peran<br><br>
                            <!-- GANTI -->
                            Deskripsi tugas anggota tim.
                        </div>

                        <div class="member">
                            <b>Nama 2</b><br>
                            Peran<br><br>
                            Deskripsi tugas anggota tim.
                        </div>

                        <div class="member">
                            <b>Nama 3</b><br>
                            Peran<br><br>
                            Deskripsi tugas anggota tim.
                        </div>

                        <div class="member">
                            <b>Nama 4</b><br>
                            Peran<br><br>
                            Deskripsi tugas anggota tim.
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Presentasi Canva</h2>

                    <p>
                        Klik tombol di bawah untuk melihat presentasi proyek kami:
                    </p>

                    <a href="https://canva.link/8hyzfspodb67crg" target="_blank"
                       style="padding:10px 15px; background:#2a5298; color:white; text-decoration:none; border-radius:8px;">
                       Buka Canva
                    </a>
                </div>
                `;
            }

            document.getElementById("content").innerHTML = content;
        }
    </script>

</body>
</html>

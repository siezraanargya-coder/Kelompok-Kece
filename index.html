<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kelompok 9-Kelompok Kece</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        nav {
            margin: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            background-color: blue;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }

        #content {
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <h1 style="color:black;">Kelompok Kece</h1>

    <!-- Tombol Navigasi -->
    <nav>
        <button onclick="showContent('home')">Home</button>
        <button onclick="showContent('design')">Design</button>
        <button onclick="showContent('about')">About</button>
    </nav>

    <!-- Konten -->
    <div id="content">
        <p>Klik salah satu tombol di atas untuk melihat isi.</p>
    </div>

    <!-- JavaScript -->
    <script>
        function showContent(menu) {
            let text = "";

            if (menu === "home") {
                text = `
                    <p>
                    Halo teman-teman 👋
                    
                    Kelompok 9 atau Kelompok Kece berencana membuat sebuah proyek yang bertujuan untuk mengembangkan kreativitas sekaligus melatih kerja sama tim.
                    Dalam prosesnya, setiap anggota memiliki peran masing-masing agar proyek dapat berjalan dengan baik dan terorganisir.
                    Mereka mulai dari tahap perencanaan, pembagian tugas, hingga pelaksanaan dengan penuh tanggung jawab.
                    Izinkan kami memperkenalkan anggota Kelompok Kece :
                    1. Ezra Anargya Sipayung
                    2. Ezra Putra Sihaloho
                    3. Jonathan Brandon Warokka
                    4. Steven Twen Van Dez
                    
                    Dengan semangat kebersamaan, Kelompok 9 berharap proyek yang mereka buat tidak hanya berhasil, tetapi juga memberikan manfaat serta pengalaman berharga bagi semua anggotanya.
                    Terimakasih 🙏
                    </p>
                `;
            } 
            else if (menu === "design") {
                text = `
                    <p>
                    Coming soon guys
                    </p>
                `;
            } 
            else if (menu === "about") {
                text = `
                    <p>Pengenalan kelompok kami (Masih progres guys):</p>

                    <p>
                        Canva tidak bisa ditampilkan langsung di website ini.<br>
                        Silakan buka melalui tombol berikut:
                    </p>

                    <a href="https://canva.link/8hyzfspodb67crg" target="_blank"
                       style="padding:10px; background:blue; color:white; text-decoration:none; border-radius:5px;">
                       Buka Canva
                    </a>
                `;
            }

            document.getElementById("content").innerHTML = text;
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AirMate</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to bottom, #00c853, #b2ff59);
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
}

.logo {
    display: flex;
    align-items: center;
    font-size: 22px;
    font-weight: bold;
}

.logo img {
    width: 40px;
    margin-right: 10px;
}

.menu a {
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-size: 14px;
}

/* SECTION */
.section {
    text-align: center;
    padding: 60px 20px;
}

.section h1 {
    font-size: clamp(24px,5vw,40px);
}

.underline {
    width: 80px;
    height: 4px;
    background: white;
    margin: 10px auto;
    border-radius: 10px;
}

.card {
    background: rgba(255,255,255,0.95);
    color: #333;
    margin: 30px auto;
    padding: 25px;
    border-radius: 20px;
    max-width: 800px;
}

/* TEXT AREA */
textarea {
    width: 100%;
    height: 80px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

/* TEAM */
.team {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.member {
    background: #f4f4f4;
    padding: 15px;
    border-radius: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    padding: 12px 20px;
    background: #00c853;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    margin-top: 15px;
}

/* RESPONSIVE */
@media(max-width:600px){
    .team {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">
        <img src="https://github.com/siezraanargya-coder/Kelompok-Kece/blob/3fbc7b85e7bebad434754ac184cc7fd19b6cdaa0/IMG-20260409-WA0012.jpg">
        AirMate
    </div>

    <div class="menu">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#design">Design</a>
    </div>
</nav>

<!-- HOME -->
<section id="home" class="section">
    <h1>Selamat Datang di AirMate 💧</h1>
    <div class="underline"></div>

    <div class="card">
        <textarea placeholder="Website ini dibuat sebagai media informasi dan presentasi proyek kami yang berfokus pada pentingnya menjaga kesehatan melalui kebiasaan minum air putih secara teratur. Melalui tampilan yang sederhana dan interaktif, website ini membantu pengguna memahami tujuan proyek serta fitur yang dikembangkan dalam sistem pengingat minum air."></textarea>
    </div>

    <div class="card">
        <textarea placeholder="Proyek ini dilatarbelakangi oleh kebiasaan masyarakat yang sering lupa untuk minum air putih secara cukup setiap harinya. Kurangnya asupan air dapat berdampak pada kesehatan tubuh, seperti dehidrasi dan menurunnya konsentrasi. Oleh karena itu, kami merancang sebuah solusi berupa sistem pengingat waktu minum air putih yang dapat membantu pengguna membangun kebiasaan hidup sehat."></textarea>
    </div>

    <div class="card">
        <textarea placeholder="Tujuan dari proyek ini adalah untuk meningkatkan kesadaran masyarakat akan pentingnya menjaga kebutuhan cairan tubuh. Selain itu, proyek ini juga bertujuan untuk membantu pengguna agar lebih disiplin dalam mengatur waktu minum air melalui sistem pengingat yang sederhana dan mudah digunakan."></textarea>
    </div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
    <h1>Tentang Kami</h1>
    <div class="underline"></div>

    <div class="card">
        <textarea placeholder="Ini adalah anggota kelompok kami (Kelompok 9)"></textarea>
    </div>

    <div class="card">
        <h2>👥 Anggota Kelompok</h2>

        <div class="team">
            <div class="member">
                <b>Ezra Anargya Sipayung</b><br>Programmer
                <textarea placeholder="Bertugas sebagai programmer dengan membuat kode dan sistem untuk menciptakan web. Selain itu, saya juga memperbaiki "bug" yang ada di dalam web."></textarea>
            </div>

            <div class="member">
                <b>Ezra Putra Sihaloho</b><br>Graphic Designer
                <textarea placeholder="Mendesain tampilan aplikasi agar menarik dan mudah digunakan. Tujuanku adalah menciptakan desain yang simpel, enak dilihat, dan membantu pengguna memahami fitur aplikasi dengan lebih mudah."></textarea>
            </div>

            <div class="member">
                <b>Jonathan Brandon Warokka</b><br>Content Writer
                <textarea placeholder="Membuat berbagai tulisan untuk kebutuhan website, mulai dari artikel, konten informatif, hingga materi promosi. Memastikan jug konten yang dibuat mudah dipahami, menarik, dan sesuai dengan target pembaca.
                    "></textarea>
            </div>

            <div class="member">
                <b>Steven Twen Van Dez</b><br>Web Developer
                <textarea placeholder="Bertugas untuk merancang, membuat, dan mengembangkan website atau aplikasi. Dan memastikan tampilannya menarik, mudah digunakan, serta fitur-fiturnya dapat berjalan dengan baik dan lancar."></textarea>
            </div>
        </div>
    </div>

    <!-- CANVA -->
    <div class="card">
        <h2>Presentasi Canva</h2>

        <div style="position: relative; width: 100%; padding-top: 56.25%; border-radius: 10px; overflow: hidden; margin-top: 20px;">
            <iframe 
                src="https://www.canva.com/design/DAHGXPyfuyA/ug14rJutjm4QVF5EamGv2A/view?embed"
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
                allowfullscreen>
            </iframe>
        </div>

        <div style="text-align:center; margin-top:15px;">
            <a href="https://www.canva.com/design/DAHGXPyfuyA/ug14rJutjm4QVF5EamGv2A/view"
               target="_blank"
               class="btn">
               Buka Canva
            </a>
        </div>
    </div>
</section>

<!-- DESIGN -->
<section id="design" class="section">
    <h1>Desain & Fitur</h1>
    <div class="underline"></div>

    <div class="card">
        <textarea placeholder="AirMate dirancang sebagai website yang simpel, bersih, dan mudah digunakan oleh semua kalangan, khususnya remaja. Desainnya menggunakan warna-warna segar seperti biru dan putih yang identik dengan air dan kesegaran, serta tampilan yang minimalis agar pengguna tidak merasa bingung saat menggunakannya. Layout dibuat rapi dengan ikon dan ilustrasi yang menarik supaya terlihat modern dan nyaman dilihat dalam waktu lama."></textarea>
    </div>

    <div class="card">
        <textarea placeholder="Fitur utama AirMate berfokus pada pengingat waktu minum air secara berkala. Pengguna mendapatkan notifikasi dalam jangka waktu tertentu untuk kembali minum air putih. Dengan konsep ini, AirMate tidak hanya menjadi pengingat, tetapi juga teman digital yang membantu membangun kebiasaan hidup sehat."></textarea>
    </div>
</section>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 9-Kelompok Kece</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to bottom, #00c853, #b2ff59);
            color: #333;
        }

        h1 {
            text-align: center;
            color: white;
            padding: 20px;
            font-size: clamp(20px, 5vw, 36px);
        }

        nav {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            background-color: white;
            color: #00c853;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: clamp(12px, 3vw, 16px);
        }

        button:hover {
            background-color: #00c853;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #00c853;
            font-size: clamp(18px, 4vw, 26px);
        }

        .card p {
            font-size: clamp(14px, 3.5vw, 18px);
            line-height: 1.6;
        }

        .team {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .member {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            font-size: clamp(13px, 3vw, 16px);
        }

        /* Responsive untuk HP */
        @media (max-width: 600px) {
            .team {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <h1>Pengingat Waktu untuk Minum Air Putih ⏱️</h1>

    <nav>
        <button onclick="showContent('Home')">Home</button>
        <button onclick="showContent('Our Products')">Design</button>
        <button onclick="showContent('About Us')">About</button>
    </nav>

    <div class="container" id="content">

        <div class="card">
            <h2>Deskripsi Proyek</h2>
            <p>
                Tuliskan deskripsi singkat tentang proyek kamu di sini.
            </p>
        </div>

    </div>

    <script>
        function showContent(menu) {

            let content = "";

            if (menu === "Home") {
                content = `
                <div class="card">
                    <h2>Deskripsi Proyek</h2>
                    <p>
                        Jelaskan tujuan proyek kamu di sini.
                    </p>
                </div>
                `;
            }

            else if (menu === "Our Products") {
                content = `
                <div class="card">
                    <h2>Konsep & Desain</h2>
                    <p>
                        Jelaskan desain dan konsep proyek kamu di sini.
                    </p>
                </div>
                `;
            }

            else if (menu === "About Us") {
                content = `
                <div class="card">
                    <h2>👥 Tim Pengembang</h2>

                    <div class="team">
                        <div class="member">
                            <b>Nama 1</b><br>
                            Peran<br><br>
                            Deskripsi tugas.
                        </div>

                        <div class="member">
                            <b>Nama 2</b><br>
                            Peran<br><br>
                            Deskripsi tugas.
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h2>Presentasi Canva</h2>

                    <a href="https://canva.link/8hyzfspodb67crg" target="_blank"
                       style="padding:10px 15px; background:#00c853; color:white; text-decoration:none; border-radius:8px; font-size:clamp(14px,3vw,16px);">
                       Buka Canva
                    </a>
                </div>
                `;
            }

            document.getElementById("content").innerHTML = content;
        }
    </script>

</body>
</html>
